name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      # Подпись релиза только если в репозитории заданы секреты keystore.
      # Движок sing-box (libbox AAR) не закоммичен и спрятан за флагом
      # ENGINE_AAR_AVAILABLE=false — сборка компилируется без AAR как есть.
      - name: Decode keystore
        id: keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > "$GITHUB_WORKSPACE/release.keystore"
            echo "has_signing=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_signing=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build signed release APK
        if: steps.keystore.outputs.has_signing == 'true'
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew :app:assembleRelease --no-daemon

      - name: Build debug APK (no signing secrets)
        if: steps.keystore.outputs.has_signing != 'true'
        run: ./gradlew :app:assembleDebug --no-daemon

      - name: Collect APK
        id: apk
        run: |
          APK=$(find app/build/outputs/apk -name '*.apk' | head -n 1)
          if [ -z "$APK" ]; then
            echo "No APK produced" >&2
            exit 1
          fi
          # Имя с версией, чтобы на телефоне было видно, какой это релиз.
          DEST="SAPN-VPN-${GITHUB_REF_NAME}.apk"
          cp "$APK" "$DEST"
          echo "path=$DEST" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: SAPN VPN Android ${{ github.ref_name }}
          generate_release_notes: true
          files: ${{ steps.apk.outputs.path }}
